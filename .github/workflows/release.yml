name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - next

jobs:
  release-npm:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout 🔰
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js 🧮
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Cache Node.js modules 💾
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.npm
          key: ${{ runner.OS }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.OS }}-node-
            ${{ runner.OS }}-

      - name: Install dependencies ⏬
        run: npm ci

      - name: Build (dist) artifacts 🏗️
        run: npm run build:dist

      - name: Semantic Release 🚀
        uses: cycjimmy/semantic-release-action@v6
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
  release-docker:
    needs: release-npm
    uses: ./.github/workflows/release_docker.yml
    with:
      release_is_published: ${{ needs.release-npm.outputs.new_release_published }}
      release_version: ${{ needs.release-npm.outputs.new_release_version }}
    secrets:
      nexus_user: ${{ secrets.NEXUS_USERNAME }}
      nexus_pass: ${{ secrets.NEXUS_PASSWORD }}
